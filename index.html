<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

.hero{
    width:100%;
    min-height:100vh;
    padding:40px 8%;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#2d3559;
}

nav ul{
    display:flex;
    list-style:none;
    gap:40px;
}

nav ul li{
    cursor:pointer;
    color:#333;
    transition:.3s;
}

nav ul li:hover{
    color:#ff4d4d;
}

.content{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.left{
    width:50%;
}

.left h1{
    font-size:70px;
    color:#2d3559;
    margin-bottom:15px;
}

.left h3{
    font-size:28px;
    color:#666;
    margin-bottom:20px;
}

.left p{
    color:#777;
    font-size:18px;
    line-height:1.7;
    max-width:500px;
    margin-bottom:30px;
}

.btn1{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.btn2{
    background:white;
    color:#ff4d4d;
    border:2px solid #ff4d4d;
    padding:15px 35px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    margin-left:15px;
}

.right{
    width:50%;
    display:flex;
    justify-content:center;
}

.right img{
    width:600px;
    max-width:100%;
    height:auto;
}

/* Mobile */

@media(max-width:900px){

    .content{
        flex-direction:column-reverse;
        text-align:center;
        gap:30px;
    }

    .left,
    .right{
        width:100%;
    }

    .left h1{
        font-size:50px;
    }

    nav{
        flex-direction:column;
        gap:20px;
    }

    nav ul{
        gap:20px;
    }
}
</style>

</head>
<body>

<section class="hero">

    <nav>
        <div class="logo">APEX ATHLETE</div>

        <ul>
            <li>Home</li>
            <li>Programs</li>
            <li>Services</li>
            <li>Contact</li>
        </ul>
    </nav>

    <div class="content">

        <div class="left">
            <h1>APEX ATHLETE</h1>

            <h3>Train Like A Champion</h3>

            <p>
                Improve your speed, endurance and athletic performance
                with professional training programs designed for athletes.
            </p>

            <button class="btn1">Get Started</button>
            <button class="btn2">Learn More</button>
        </div>

        <div class="right">
            <img src="img/2201_w020_n001_1251a_p30_1251-removebg-preview.png" alt="">
        </div>

    </div>

</section>

</body>
</html>
