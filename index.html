<!DOCTYPE html>
<html>
<head>
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    
}

.hero{
   
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    width:1000px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

.content{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:50px;
}

.left{
    width:45%;
}

.left h1{
    font-size:50px;
    color:#2d3559;
}

.left h3{
    margin:10px 0;
    color:#666;
}

.left p{
    margin:20px 0;
    color:#777;
}

.btn1{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
}

.btn2{
    background:white;
    color:#ff4d4d;
    border:2px solid #ff4d4d;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    margin-left:10px;
}

.right img{
    width:400px;
    max-width:100%;
}
</style>
<div class="hero">

    <div class="card">

        <nav>
            <div class="logo">LOGO</div>

            <ul>
                <li>Home</li>
                <li>Service</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>

        <div class="content">

            <div class="left">
                <h1>LOREM IPSUM</h1>

                <h3>DOLOR SIT AMET</h3>

                <p>
                    Modern landing page created using only HTML and CSS.
                </p>

                <button class="btn1">Sign In</button>
                <button class="btn2">Register</button>
            </div>

            <div class="right">
                <img src="img/2201_w020_n001_1251a_p30_1251-removebg-preview.png" alt="">
            </div>

        </div>

    </div>

</div>

</body>
</html>
