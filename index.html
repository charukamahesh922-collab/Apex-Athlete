<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX ATHLETE | Animated Performance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', 'Arial', sans-serif;
}

/* Import Google Fonts for modern look */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

/* GLOBAL THEME TRANSITION */
body, .hero, nav, .logo, nav ul li, .left h1, .left h3, .left p, .btn1, .btn2, .right img {
    transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
}

body{
    background:#0a0f1f;  /* deep black-blue background base */
    transition: background 0.3s, color 0.2s;
    overflow-x: hidden;
}

/* LIGHT THEME */
body.light-theme {
    background: #f0f4fc;
}

/* Hero section background adapts */
.hero{
    width:100%;
    min-height:100vh;
    padding:40px 8%;
    background: transparent;
}

/* ========== ANIMATION KEYFRAMES ========== */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(60px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInLeft {
    from {
        opacity: 0;
        transform: translateX(-50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeInRight {
    from {
        opacity: 0;
        transform: translateX(50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes glowPulse {
    0% {
        filter: drop-shadow(0 0 5px rgba(59,130,246,0.3)) drop-shadow(0 8px 20px rgba(0,0,0,0.4));
        transform: scale(1) rotate(0deg);
    }
    50% {
        filter: drop-shadow(0 0 20px rgba(59,130,246,0.7)) drop-shadow(0 12px 28px rgba(0,0,0,0.5));
        transform: scale(1.02) rotate(1deg);
    }
    100% {
        filter: drop-shadow(0 0 5px rgba(59,130,246,0.3)) drop-shadow(0 8px 20px rgba(0,0,0,0.4));
        transform: scale(1) rotate(0deg);
    }
}

@keyframes floatMotion {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-15px);
    }
    100% {
        transform: translateY(0px);
    }
}

@keyframes subtleZoom {
    0% {
        transform: scale(1);
    }
    100% {
        transform: scale(1.03);
    }
}

/* loading preloader animation */
.preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #05070f;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s ease;
}

body.light-theme .preloader {
    background: #eef2ff;
}

.preloader.hide {
    opacity: 0;
    visibility: hidden;
}

.loader {
    text-align: center;
}

.loader-circle {
    width: 70px;
    height: 70px;
    border: 5px solid rgba(59,130,246,0.2);
    border-top: 5px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loader-text {
    color: #3b82f6;
    font-weight: 600;
    letter-spacing: 2px;
    animation: blinkText 1.5s infinite;
}

@keyframes blinkText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Animated elements for content */
.animate-left {
    animation: fadeInLeft 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
}

.animate-right {
    animation: fadeInRight 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
}

.animate-up {
    animation: fadeInUp 0.7s ease forwards;
}

.delay-1 {
    animation-delay: 0.2s;
    opacity: 0; /* start invisible */
    animation-fill-mode: forwards;
}

.delay-2 {
    animation-delay: 0.4s;
    opacity: 0;
    animation-fill-mode: forwards;
}

.delay-3 {
    animation-delay: 0.6s;
    opacity: 0;
    animation-fill-mode: forwards;
}

/* Image animation: floating + pulse glow combined */
.animated-image {
    animation: floatMotion 3s ease-in-out infinite, glowPulse 4s ease-in-out infinite;
    transition: all 0.3s;
    will-change: transform;
}

.animated-image:hover {
    animation: floatMotion 1.2s ease-in-out infinite, subtleZoom 0.5s forwards;
    cursor: pointer;
}

/* Navbar & restyling */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
    opacity: 0;
    animation: fadeInUp 0.6s ease forwards;
    animation-delay: 0.1s;
}

.logo{
    font-size:28px;
    font-weight:800;
    color: #3b82f6;  /* electric blue */
    letter-spacing: 1px;
    transition: color 0.2s;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    -webkit-background-clip: text;
    background-clip: text;
    color: #3b82f6;
}

body.light-theme .logo {
    color: #1e40af;
    background: none;
    -webkit-background-clip: unset;
}

nav ul{
    display:flex;
    list-style:none;
    gap:40px;
}

nav ul li{
    cursor:pointer;
    color: #cbd5e1;
    font-weight: 500;
    transition:.3s;
    position: relative;
}

nav ul li::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: #3b82f6;
    transition: width 0.3s;
}

nav ul li:hover::after {
    width: 100%;
}

body.light-theme nav ul li::after {
    background: #2563eb;
}

nav ul li:hover{
    color: #60a5fa;
}

body.light-theme nav ul li {
    color: #1f2937;
}

body.light-theme nav ul li:hover {
    color: #2563eb;
}

.content{
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 30px;
}

.left{
    width:50%;
}

.left h1{
    font-size:70px;
    color: #3b82f6;
    margin-bottom:15px;
    font-weight: 800;
    letter-spacing: -1px;
}

body.light-theme .left h1 {
    color: #1e3a8a;
}

.left h3{
    font-size:28px;
    color: #94a3b8;
    margin-bottom:20px;
    font-weight: 600;
}

body.light-theme .left h3 {
    color: #4b5563;
}

.left p{
    color: #9ca3af;
    font-size:18px;
    line-height:1.7;
    max-width:500px;
    margin-bottom:30px;
    font-weight: 400;
}

body.light-theme .left p {
    color: #374151;
}

.btn1{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:40px;
    cursor:pointer;
    font-size:16px;
    transition: 0.25s;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(37,99,235,0.4);
    position: relative;
    overflow: hidden;
}

.btn1::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}

.btn1:hover::before {
    left: 100%;
}

.btn1:hover {
    background: #1d4ed8;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(37,99,235,0.5);
}

.btn2{
    background:transparent;
    color:#3b82f6;
    border:2px solid #3b82f6;
    padding:15px 35px;
    border-radius:40px;
    cursor:pointer;
    font-size:16px;
    margin-left:15px;
    font-weight: 600;
    transition: 0.25s;
}

.btn2:hover {
    background: rgba(59,130,246,0.1);
    border-color: #60a5fa;
    color: #60a5fa;
    transform: translateY(-3px);
}

body.light-theme .btn2 {
    color: #2563eb;
    border-color: #2563eb;
}
body.light-theme .btn2:hover {
    background: rgba(37,99,235,0.08);
    color: #1e40af;
    border-color: #1e40af;
}

.right{
    width:50%;
    display:flex;
    justify-content:center;
}

.right img{
    width:600px;
    max-width:100%;
    height:auto;
    border-radius: 20px;
    transition: transform 0.3s, filter 0.3s;
}

/* THEME TOGGLE BUTTON STYLES */
.theme-toggle {
    background: #1e293b;
    border: none;
    cursor: pointer;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.2s;
    margin-left: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    color: #facc15;
}

body.light-theme .theme-toggle {
    background: #e2e8f0;
    color: #1e293b;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.theme-toggle:hover {
    transform: scale(1.08) rotate(10deg);
    background: #334155;
}

body.light-theme .theme-toggle:hover {
    background: #cbd5e1;
}

.nav-wrapper {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* Responsive */
@media(max-width:900px){
    .content{
        flex-direction:column-reverse;
        text-align:center;
        gap:30px;
    }
    .left,
    .right{
        width:100%;
    }
    .left h1{
        font-size:50px;
    }
    nav{
        flex-direction:column;
        gap:20px;
    }
    nav ul{
        gap:20px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .theme-toggle {
        margin-left: 0;
    }
    .nav-wrapper {
        flex-direction: column;
        gap: 12px;
    }
    .left p {
        max-width: 100%;
    }
    .btn1, .btn2 {
        margin: 8px 6px;
    }
}
</style>
</head>
<body>

<!-- PRELOADER ANIMATION -->
<div class="preloader" id="preloader">
    <div class="loader">
        <div class="loader-circle"></div>
        <div class="loader-text">IGNITING POWER</div>
    </div>
</div>

<section class="hero">

    <nav>
        <div class="logo">⚡ APEX ATHLETE</div>
        <div class="nav-wrapper">
            <ul>
                <li>Home</li>
                <li>Programs</li>
                <li>Services</li>
                <li>Contact</li>
            </ul>
            <button class="theme-toggle" id="themeToggleBtn" aria-label="Switch theme">
                🌙
            </button>
        </div>
    </nav>

    <div class="content">

        <div class="left">
            <h1 class="animate-left">APEX ATHLETE</h1>

            <h3 class="animate-left delay-1">Train Like A Champion</h3>

            <p class="animate-left delay-2">
                Improve your speed, endurance and athletic performance
                with professional training programs designed for athletes.
            </p>

            <div class="animate-left delay-3">
                <button class="btn1">Get Started</button>
                <button class="btn2">Learn More</button>
            </div>
        </div>

        <div class="right animate-right">
            <img class="animated-image" src="img/2201_w020_n001_1251a_p30_1251-removebg-preview.png" alt="Dynamic athlete illustration - Speed & Agility">
        </div>

    </div>

</section>

<script>
    // ========== PRELOADER LOGIC + PAGE LOAD ANIMATION ==========
    window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            setTimeout(() => {
                preloader.classList.add('hide');
                // after preloader hidden, ensure body scroll is visible
                document.body.style.overflow = 'auto';
            }, 1200); // show preloader for 1.2 sec for dramatic effect
        }
        
        // additional: make sure any elements with opacity animation start properly
        const animatedLefts = document.querySelectorAll('.animate-left, .animate-right');
        animatedLefts.forEach(el => {
            if (el.style.opacity !== '0') {
                // ensure they get animation styles; pre-existing inline not required
            }
        });
    });

    // If there is any flash of preloader background, ensure final removal
    document.body.style.overflow = 'hidden';
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.body.style.overflow = 'auto';
        }, 1300);
    });

    // ========== THEME TOGGLE LOGIC ==========
    const toggleBtn = document.getElementById('themeToggleBtn');
    const currentTheme = localStorage.getItem('apexTheme');
    
    function updateButtonIcon(isLight) {
        if (isLight) {
            toggleBtn.innerHTML = '☀️';
            toggleBtn.style.color = '#f59e0b';
        } else {
            toggleBtn.innerHTML = '🌙';
            toggleBtn.style.color = '#facc15';
        }
    }
    
    function setTheme(themeName) {
        if (themeName === 'light') {
            document.body.classList.add('light-theme');
            localStorage.setItem('apexTheme', 'light');
            updateButtonIcon(true);
        } else {
            document.body.classList.remove('light-theme');
            localStorage.setItem('apexTheme', 'dark');
            updateButtonIcon(false);
        }
    }
    
    if (currentTheme === 'light') {
        setTheme('light');
    } else {
        setTheme('dark');
    }
    
    toggleBtn.addEventListener('click', () => {
        const isLightTheme = document.body.classList.contains('light-theme');
        if (isLightTheme) {
            setTheme('dark');
        } else {
            setTheme('light');
        }
    });
    
    // Additional hover animations for image & visual enhancement
    const heroImg = document.querySelector('.right img');
    if (heroImg) {
        heroImg.addEventListener('mouseenter', () => {
            heroImg.style.transition = 'transform 0.25s';
        });
        heroImg.addEventListener('mouseleave', () => {
            heroImg.style.transform = 'scale(1)';
        });
    }
    
    // Add parallax or micro interactivity to buttons
    const btns = document.querySelectorAll('.btn1, .btn2');
    btns.forEach(btn => {
        btn.addEventListener('mousedown', () => {
            btn.style.transform = 'scale(0.97)';
        });
        btn.addEventListener('mouseup', () => {
            btn.style.transform = 'translateY(-3px)';
        });
        btn.addEventListener('mouseleave', () => {
            btn.style.transform = 'translateY(0)';
        });
    });
    
    // Console log theme status ready
    console.log('🔥 APEX ATHLETE: Dynamic animations & theme toggler active | Image floating animation active');
</script>
</body>
</html>
